
name: Aruma Daily Sync

on:
  schedule:
    # Corre todos los días a las 14:00 UTC (9:00 AM Bogotá)
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium
      
      - name: Run scraper
        env:
          ARUMA_USER: ${{ secrets.ARUMA_USER }}
          ARUMA_PASSWORD: ${{ secrets.ARUMA_PASSWORD }}
          ARUMA_APPS_SCRIPT_URL: ${{ secrets.ARUMA_APPS_SCRIPT_URL }}
        run: python aruma_sync.py
